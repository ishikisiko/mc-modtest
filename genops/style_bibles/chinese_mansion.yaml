id: chinese_mansion
version: 1

identity:
  one_sentence: "三进江南大宅：门厅入序、主院立身、后院收束、花园以水石亭廊成游线。"

must_have:
  - "gate_house 是真实过厅，不是墙洞"
  - "正房、绣楼、园亭各自服务不同院落"
  - "主轴和花园游线材料边界可读"
  - "假山、水岸、亭之间有可看的焦点关系"

should_have:
  - "月洞门作为正式轴线到游线的边界"
  - "水亭直接接触池岸并有抬高基座"
  - "廊下、夹道、天井心有不同表面"

must_not_have:
  - "亭、石、荷叶均匀散铺"
  - "主院被全宽石平台吞掉"
  - "绣楼误放进花园核心"

