    score_3: "有基础沿街界面"
    score_5: "街墙、巷、摊、灯、招牌形成可逛空间"
  silhouette:
    weight: 1.0
    question: "远景是否有墙形、核心和竖向地标？"
    score_1: "平"
    score_3: "有少量地标"
    score_5: "轮廓、门、塔/殿、边界层级清楚"

blocking_defects:
